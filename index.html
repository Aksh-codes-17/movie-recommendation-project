
<form method="POST">
<input name="genre" placeholder="Enter Genre">
<button type="submit">Recommend</button>
</form>

<table>
<tr>
<th>Title</th>
<th>Release Date</th>
<th>Rating</th>
<th>Genre</th>
<th>Overview</th>
</tr>

{% for movie in movies %}
<tr>
<td>{{ movie.title }}</td>
<td>{{ movie.release_date }}</td>
<td>{{ movie.vote_average }}</td>
<td>{{ movie.genres }}</td>
<td>{{ movie.overview }}</td>
</tr>
{% endfor %}

</table>
