<!DOCTYPE html>
<html>
<head>

<title>Movie Recommendation System</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<h1>🎬 Movie Recommendation System</h1>

<form method="POST">

<input type="text" name="genre" placeholder="Enter Genre (Action, Comedy, Drama)">
<button type="submit">Recommend</button>

</form>

<table>

<tr>
<th>Title</th>
<th>Release Date</th>
<th>Rating</th>
<th>Genres</th>
<th>Overview</th>
</tr>

{% for movie in movies %}

<tr>
<td>{{ movie[0] }}</td>
<td>{{ movie[1] }}</td>
<td>{{ movie[2] }}</td>
<td>{{ movie[3] }}</td>
<td>{{ movie[4] }}</td>
</tr>

{% endfor %}

</table>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
